server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/vulnuris_auth}
    username: ${AUTH_DB_USERNAME:postgres}
    password: ${AUTH_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${AUTH_DB_POOL_MAX_SIZE:15}
      minimum-idle: ${AUTH_DB_POOL_MIN_IDLE:3}
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

security:
  jwt:
    secret: ${JWT_SECRET:tRlQIxPxVydGh6gR3kVFcsW3YHczi8BIcakqkPUcgOP}
    issuer: ${JWT_ISSUER:vulnuris-auth-service}
    access-token-validity-seconds: ${JWT_ACCESS_TTL_SECONDS:1800}
    refresh-token-validity-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}
  cors:
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  bootstrap-admin:
    enabled: ${AUTH_BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:admin}
    email: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:admin@vulnuris.local}
    password: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:ChangeThisAdminPassword123!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"
